name: publish

on:
  push:
    tags:
      - "v*"
  release:
    types: [published]
  workflow_dispatch:

env:
  HAS_PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN != '' }}
  HAS_TEST_PYPI_API_TOKEN: ${{ secrets.TEST_PYPI_API_TOKEN != '' }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install packaging tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Build artifacts
        run: python -m build
      - name: Validate package metadata
        run: python -m twine check dist/*.whl dist/*.tar.gz
      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: release-dists
          path: dist/*

  publish-testpypi-token:
    if: github.event_name == 'workflow_dispatch' && env.HAS_TEST_PYPI_API_TOKEN == 'true'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment:
      name: testpypi
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: release-dists
          path: dist
      - name: Publish to TestPyPI with API token
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}
          repository-url: https://test.pypi.org/legacy/

  publish-testpypi-trusted:
    if: github.event_name == 'workflow_dispatch' && env.HAS_TEST_PYPI_API_TOKEN != 'true'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    environment:
      name: testpypi
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: release-dists
          path: dist
      - name: Publish to TestPyPI with Trusted Publishing
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi-token:
    if: (github.event_name == 'release' || startsWith(github.ref, 'refs/tags/v')) && env.HAS_PYPI_API_TOKEN == 'true'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment:
      name: pypi
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: release-dists
          path: dist
      - name: Publish to PyPI with API token
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

  publish-pypi-trusted:
    if: (github.event_name == 'release' || startsWith(github.ref, 'refs/tags/v')) && env.HAS_PYPI_API_TOKEN != 'true'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    environment:
      name: pypi
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: release-dists
          path: dist
      - name: Publish to PyPI with Trusted Publishing
        uses: pypa/gh-action-pypi-publish@release/v1
